name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: mvn clean package

      - name: Run Tests
        run: mvn test

  staging:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Staging Deployment
        run: |
          echo "Deploying to staging..."
          mkdir staging
          echo "App deployed to staging"

      - name: Verify Staging
        run: |
          echo "Verifying staging..."
          # success
          exit 1

  production:
    needs: staging
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          mkdir production
          echo "App deployed to production"

  rollback:
    if: failure()
    needs: [staging, production]
    runs-on: ubuntu-latest

    steps:
      - name: Rollback Deployment
        run: |
          echo "Rollback triggered!"
          mkdir backup
          echo "Restored previous version"